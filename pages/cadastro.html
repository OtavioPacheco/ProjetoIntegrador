<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cadastro - BR Games</title>
  <link rel="stylesheet" href="../css/cadastro_style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <script src="../js/cadastro_script.js"></script>
</head>
<body>
  <div class="container">
    <img src="../icons/login_icons/do-utilizador.png" alt="Ícone de usuário">
    <h1>Cadastro</h1>

    <input type="text" id="nome" placeholder="Digite seu nome completo">
    <input type="email" id="email" placeholder="Digite seu email">
    <input type="password" id="senha" placeholder="Digite sua senha">
    <input type="password" id="confirmarSenha" placeholder="Confirme sua senha">
    
    <a href="index.html" class="btn-cadastrar">Cadastrar</a>
    <p>Já possui conta? <a href="login.html">Faça login</a></p>
  </div>
</body>
</html>
